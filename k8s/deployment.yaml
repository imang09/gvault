apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvault
  namespace: gvault
  labels:
    app: gvault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gvault
  template:
    metadata:
      labels:
        app: gvault
    spec:
      containers:
        - name: gvault
          image: ghcr.io/imang09/gvault:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DB_DIR
              value: "/app/data"
            - name: NODE_ENV
              value: "production"
            - name: GVAULT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gvault-secrets
                  key: api-key
                  optional: true
          volumeMounts:
            - name: gvault-data
              mountPath: /app/data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: gvault-data
          persistentVolumeClaim:
            claimName: gvault-data
