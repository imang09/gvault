apiVersion: apps/v1
kind: Deployment
metadata:
  name: gvault
  namespace: gvault
  labels:
    app: gvault
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gvault
  template:
    metadata:
      labels:
        app: gvault
    spec:
      containers:
        - name: gvault
          image: ghcr.io/imang09/gvault:eaa5215
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
