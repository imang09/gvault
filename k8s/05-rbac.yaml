---
# ServiceAccount for EroArchive application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: erolabs-sa
  namespace: erolabs
  labels:
    app: erolabs

---
# ClusterRole for monitoring and health checks
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: erolabs-role
  labels:
    app: erolabs
rules:
  # Allow reading pod information
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Allow reading service information
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Allow reading configmaps (for dynamic config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding to attach role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: erolabs-rolebinding
  labels:
    app: erolabs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: erolabs-role
subjects:
  - kind: ServiceAccount
    name: erolabs-sa
    namespace: erolabs

---
# Role for namespace-specific operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: erolabs-ns-role
  namespace: erolabs
  labels:
    app: erolabs
rules:
  # Allow reading secrets (for application secrets)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Allow reading configmaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Allow reading persistent volumes
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]

---
# RoleBinding for namespace-specific role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: erolabs-ns-rolebinding
  namespace: erolabs
  labels:
    app: erolabs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: erolabs-ns-role
subjects:
  - kind: ServiceAccount
    name: erolabs-sa
    namespace: erolabs
