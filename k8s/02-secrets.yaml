---
# Secret for sensitive environment variables
# NOTE: This is a template. Replace placeholders with actual values.
# In production, use external secret management (e.g., Sealed Secrets, External Secrets Operator)
apiVersion: v1
kind: Secret
metadata:
  name: erolabs-secrets
  namespace: erolabs
type: Opaque
stringData:
  # Database configuration
  DATABASE_URL: "mysql://user:password@mysql-service:3306/erolabs"
  
  # JWT and OAuth secrets
  JWT_SECRET: "your-jwt-secret-key-change-this"
  OAUTH_SERVER_URL: "https://oauth.example.com"
  VITE_OAUTH_PORTAL_URL: "https://oauth.example.com/portal"
  
  # API keys
  BUILT_IN_FORGE_API_KEY: "your-forge-api-key"
  VITE_FRONTEND_FORGE_API_KEY: "your-frontend-forge-api-key"
  
  # S3/Storage configuration
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "your-bucket-name"
  
  # Application owner info
  OWNER_NAME: "Your Name"
  OWNER_OPEN_ID: "your-open-id"

---
# Secret for Docker registry (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: erolabs
type: kubernetes.io/dockercfg
data:
  .dockercfg: eyJhdXRocyI6IHt9fQ==  # Base64 encoded empty config, replace with actual
